# Nuvora — beide Module hinter EINEM Proxy auf EINER Domain.
#   /          -> CardVote (Kern)
#   /lernpfad/ -> Lernpfad
# Die Einzel-Composes in apps/*/ bleiben fuer isoliertes Arbeiten bestehen.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nuvora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nicht gesetzt — .env aus .env.example anlegen}
      POSTGRES_DB: ${POSTGRES_DB:-nuvora}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Ohne diesen Check startet api los, bevor Postgres Verbindungen annimmt,
    # stirbt an "Connection refused" und wird nur vom restart wieder eingefangen.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nuvora} -d ${POSTGRES_DB:-nuvora}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nuvora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nuvora}
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET nicht gesetzt — .env aus .env.example anlegen}
      CORS_ORIGINS: ${SITE_URL:-http://localhost:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SITE_URL: ${SITE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Nuvora}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          # apps/web/nginx.conf proxyt intern auf Host "backend".
          # Alias, damit die App-eigene Config unveraendert weiterlaeuft.
          - backend

  web:
    build: ./apps/web
    restart: unless-stopped
    depends_on:
      - api

  lernpfad:
    # Nur noch Statik: Konten, Klassen, Schueler und Themen liegen im Kern,
    # die Fachdaten unter /api/lernpfad. Deshalb kein DB-Volume und kein
    # ADMIN_EMAIL mehr — das Modul haelt keine Daten.
    # Kein config-Mount mehr: Impressum/Datenschutz/Kontakt kommen aus Nuvora
    # (Footer verlinkt auf /legal, /contact), damit sie ueberall gleich sind.
    build: ./apps/lernpfad
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Liefert /site.json aus — CardVotes Impressum liest dieselbe Datei,
      # die Lernpfad serverseitig einliest.
      - ./config:/srv/config:ro
    depends_on:
      - web
      - lernpfad

volumes:
  pgdata:
  uploads:
