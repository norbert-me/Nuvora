# Nuvora — beide Module hinter EINEM Proxy auf EINER Domain.
#   /          -> CardVote (Kern)
#   /lernpfad/ -> Lernpfad
# Die Einzel-Composes in apps/*/ bleiben fuer isoliertes Arbeiten bestehen.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nuvora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nicht gesetzt — .env aus .env.example anlegen}
      POSTGRES_DB: ${POSTGRES_DB:-nuvora}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nuvora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nuvora}
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET nicht gesetzt — .env aus .env.example anlegen}
      CORS_ORIGINS: ${SITE_URL:-http://localhost:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SITE_URL: ${SITE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Nuvora}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    networks:
      default:
        aliases:
          # apps/web/nginx.conf proxyt intern auf Host "backend".
          # Alias, damit die App-eigene Config unveraendert weiterlaeuft.
          - backend

  web:
    build: ./apps/web
    restart: unless-stopped
    depends_on:
      - api

  lernpfad:
    build: ./apps/lernpfad
    restart: unless-stopped
    environment:
      DB_PATH: /app/data/lernpfad.db
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      # Verzeichnis mounten, nie die DB-Datei selbst: eine nicht existierende
      # gemountete Datei legt Docker als Verzeichnis an -> EISDIR.
      - lernpfad-data:/app/data
      # Betreiberdaten: eine Quelle fuer beide Module (siehe config/).
      - ./config:/app/config:ro

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Liefert /site.json aus — CardVotes Impressum liest dieselbe Datei,
      # die Lernpfad serverseitig einliest.
      - ./config:/srv/config:ro
    depends_on:
      - web
      - lernpfad

volumes:
  pgdata:
  uploads:
  lernpfad-data:
