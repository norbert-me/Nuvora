[pytest]
asyncio_mode = auto
testpaths = tests
# apps/api (rootdir) auf sys.path, damit `import app` unter `pytest` (Console-Script,
# CWD nicht auf sys.path) genauso funktioniert wie unter `python -m pytest`. Ohne das
# schlug die CI-Collection mit ModuleNotFoundError: No module named 'app' fehl.
pythonpath = .
