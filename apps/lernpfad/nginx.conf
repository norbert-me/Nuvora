server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Kein auth_basic mehr: die App bringt eigene Anmeldung (Konten je Nutzer)
    # mit. nginx-Basic-Auth würde die Login-Seite blockieren und doppelt fragen.

    # Sensible Dateien nie ausliefern (DB, Config, Backups, Quellcode).
    # Slash-Grenze wichtig: "location /daten" (ohne Slash) würde auch
    # /datenschutz.html blocken.
    location ~* \.(db|htpasswd)$ { return 404; }
    location /backups/ { return 404; }
    location /config/  { return 404; }
    location /daten/   { return 404; }

    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
