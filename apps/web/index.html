<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuvora</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0066cc">
    <!-- Schriften (Inter) und KaTeX werden lokal gebundelt — keine CDN-/Drittanbieter-Anfragen -->
    <style>
      :root {
        --bg: #ffffff; --bg2: #f5f5f7; --bg3: #fbfbfd;
        --text: #1d1d1f; --text2: #6e6e73; --text3: #86868b;
        --border: rgba(0,0,0,0.06); --border2: #d2d2d7; --border3: #e5e5e5;
        --card: #fff; --nav-bg: rgba(255,255,255,0.72); --nav-border: rgba(0,0,0,0.08);
        --accent: #0066cc; --accent-bg: #e8f0fe; --input-bg: #fff;
        --hover: rgba(0,0,0,0.05);
        --success-bg: #d4edda; --warn-bg: #fff3cd; --danger-bg: #fde2d9;
        color-scheme: light;
      }
      .dark {
        --bg: #000; --bg2: #1c1c1e; --bg3: #1c1c1e;
        --text: #f5f5f7; --text2: #ababaf; --text3: #98989d;
        --border: rgba(255,255,255,0.08); --border2: #48484a; --border3: #38383a;
        --card: #1c1c1e; --nav-bg: rgba(0,0,0,0.85); --nav-border: rgba(255,255,255,0.08);
        --accent: #0a84ff; --accent-bg: rgba(10,132,255,0.12); --input-bg: #2c2c2e;
        --hover: rgba(255,255,255,0.06);
        --success-bg: rgba(10,125,62,0.2); --warn-bg: rgba(184,134,11,0.15); --danger-bg: rgba(209,53,15,0.15);
        color-scheme: dark;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scrollbar-gutter: stable; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      input, select, button, textarea { font-family: inherit; }
      input, select, textarea { background: var(--input-bg); color: var(--text); border-color: var(--border2); }
      input:focus, select:focus, textarea:focus {
        outline: none; border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.15);
      }
      .dark input:focus, .dark select:focus, .dark textarea:focus { box-shadow: 0 0 0 3px rgba(10,132,255,0.25); }
      button { transition: all 0.15s ease; }
      button:hover { opacity: 0.85; }
      button:active { transform: scale(0.97); }
      button.icon-btn:hover { opacity: 1; background: var(--hover) !important; }
      button.icon-btn:active { background: var(--hover) !important; }
      ::selection { background: rgba(0, 102, 204, 0.2); }
      .dark ::selection { background: rgba(10,132,255,0.3); }
      table { font-variant-numeric: tabular-nums; }
      a { color: var(--accent); }
      @media (max-width: 600px) {
        nav { padding: 0 12px !important; gap: 2px !important; }
        nav > div:first-of-type { gap: 0 !important; }
      }
      nav > div::-webkit-scrollbar { display: none; }
      @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
    </style>
    <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
