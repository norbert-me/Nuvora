server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10M;

    # ─── Kompression: JS/CSS/JSON/SVG gehen sonst unkomprimiert raus ───
    # Das Frontend-Bundle (KaTeX, dnd-kit, lzma, alle Modulseiten) ist groß;
    # gzip spart grob 70 % Übertragung. gzip_vary setzt den Vary-Header, damit
    # Caches komprimiert und unkomprimiert getrennt halten.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript text/javascript
               application/json image/svg+xml application/xml font/woff2;

    # Sicherheits-Header sitzen jetzt zentral am Nuvora-Proxy (nginx.conf im
    # Wurzelverzeichnis), damit /api und die eingebettete Lernpfad-App sie
    # ebenfalls bekommen. Hier gesetzt wuerden sie doppelt ankommen.

    # ─── Gehashte Build-Assets lange cachen ───
    # Vite legt Assets unter /assets/name.[hash].ext ab; der Hash ändert sich bei
    # jedem Inhalt, also sind sie unveränderlich und dürfen 1 Jahr im Browser-Cache
    # bleiben. Wiederbesuche laden sie gar nicht neu. index.html bleibt ungecacht
    # (siehe unten), damit ein neuer Build sofort auf die neuen Hashes zeigt.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html nie cachen — sonst zeigt der Browser nach einem Deploy weiter auf
    # alte, gelöschte Asset-Hashes (weiße Seite).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
