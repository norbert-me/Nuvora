services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cardvote
      POSTGRES_PASSWORD: cardvote
      POSTGRES_DB: cardvote
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cardvote:cardvote@db:5432/cardvote
      TOKEN_SECRET: "${TOKEN_SECRET:-change-me-before-production}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3001}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      SITE_URL: "${SITE_URL:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-CardVote}"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
