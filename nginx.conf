# Nuvora-Proxy: eine Domain, alle Module.
#
# ─── DDoS-/Missbrauchs-Schutz an der Kante ───
# Zonen liegen im http-Kontext (diese Datei wird als conf.d/*.conf INNERHALB
# von http eingebunden). Zweite Verteidigungslinie zusaetzlich zum App-seitigen
# Flood-Schutz (AbuseGuardMiddleware): faengt Last ab, bevor sie die API/den
# Node-Prozess erreicht. Grosszuegig gewaehlt, damit Live-Sessions (viele Scans
# kurz nacheinander) nicht ausgebremst werden.
limit_req_zone  $binary_remote_addr zone=api_rl:10m   rate=20r/s;   # ~20 Anfragen/s je IP
limit_conn_zone $binary_remote_addr zone=perip_conn:10m;            # gleichzeitige Verbindungen je IP
limit_req_status  429;
limit_conn_status 429;

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Gleichzeitige Verbindungen je IP deckeln (Slowloris/Verbindungs-Fluten).
    limit_conn perip_conn 50;

    # ─── Sicherheits-Header, an EINER Stelle fuer alle Antworten ───
    # Frueher setzte nur das CardVote-Frontend Header; /api und die
    # eingebettete Lernpfad-App bekamen keine. Hier greifen sie fuer alles,
    # was ueber den Proxy geht.
    #
    # SAMEORIGIN, nicht DENY: die Lernpfad-App laeuft als iframe auf derselben
    # Origin — DENY wuerde auch das blocken. Fremdes Einbetten bleibt gesperrt.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;
    # 'unsafe-inline' ist noetig: CardVote und die Lernpfad-App nutzen beide
    # Inline-Styles; connect-src erlaubt WebSockets fuer die Live-Session.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self'; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # nginx-Version nicht preisgeben.
    server_tokens off;

    # ─── Lernpfad-App: liefert nur noch Statik (index.html, css, js, vendor),
    #     die die Shell in-page injiziert; kein iframe mehr. ───
    # Die App wird nicht nachgebaut: /lernpfad/ ist die React-Seite mit Nuvoras
    # Navbar, die diese Statik in-page injiziert (Host #lp-app). Gleiche Origin,
    # daher erbt sie Nuvoras Token und spricht /api/ direkt.
    location = /lernpfad-app {
        return 301 /lernpfad-app/;
    }

    location /lernpfad-app/ {
        proxy_pass http://lernpfad:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Betreiberdaten: eine Quelle fuer beide Module ───
    # CardVotes Impressum (Legal.jsx) fetcht /site.json; Lernpfad liest
    # dieselbe Datei serverseitig ueber seinen config/-Mount.
    location = /site.json {
        alias /srv/config/site.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # ─── CardVote auf / (Kern) ───
    location /api/ {
        # Edge-Rate-Limit: 20 r/s je IP, kurze Spitzen bis 40 gepuffert (nodelay
        # = Puffer sofort durchlassen, nur echtes Dauerfeuer bekommt 429).
        limit_req zone=api_rl burst=40 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
