# Nuvora-Proxy: eine Domain, zwei Module.
server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # ─── Lernpfad-App (eingebettet unter /lernpfad/) ───
    # Die App wird nicht nachgebaut, sondern eingebettet: /lernpfad/ ist die
    # React-Seite mit Nuvoras Navbar, darin laeuft diese App im iframe.
    # Gleiche Origin, daher liest sie Nuvoras Token und spricht /api/ direkt.
    location = /lernpfad-app {
        return 301 /lernpfad-app/;
    }

    location /lernpfad-app/ {
        proxy_pass http://lernpfad:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Betreiberdaten: eine Quelle fuer beide Module ───
    # CardVotes Impressum (Legal.jsx) fetcht /site.json; Lernpfad liest
    # dieselbe Datei serverseitig ueber seinen config/-Mount.
    location = /site.json {
        alias /srv/config/site.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # ─── CardVote auf / (Kern) ───
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
