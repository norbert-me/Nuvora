# Nuvora-Proxy: eine Domain, alle Module.
server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # ─── Sicherheits-Header, an EINER Stelle fuer alle Antworten ───
    # Frueher setzte nur das CardVote-Frontend Header; /api und die
    # eingebettete Lernpfad-App bekamen keine. Hier greifen sie fuer alles,
    # was ueber den Proxy geht.
    #
    # SAMEORIGIN, nicht DENY: die Lernpfad-App laeuft als iframe auf derselben
    # Origin — DENY wuerde auch das blocken. Fremdes Einbetten bleibt gesperrt.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;
    # 'unsafe-inline' ist noetig: CardVote und die Lernpfad-App nutzen beide
    # Inline-Styles; connect-src erlaubt WebSockets fuer die Live-Session.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self'; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # nginx-Version nicht preisgeben.
    server_tokens off;

    # ─── Lernpfad-App (eingebettet unter /lernpfad/) ───
    # Die App wird nicht nachgebaut, sondern eingebettet: /lernpfad/ ist die
    # React-Seite mit Nuvoras Navbar, darin laeuft diese App im iframe.
    # Gleiche Origin, daher liest sie Nuvoras Token und spricht /api/ direkt.
    location = /lernpfad-app {
        return 301 /lernpfad-app/;
    }

    location /lernpfad-app/ {
        proxy_pass http://lernpfad:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Betreiberdaten: eine Quelle fuer beide Module ───
    # CardVotes Impressum (Legal.jsx) fetcht /site.json; Lernpfad liest
    # dieselbe Datei serverseitig ueber seinen config/-Mount.
    location = /site.json {
        alias /srv/config/site.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # ─── CardVote auf / (Kern) ───
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
